<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danger Room · Checkmat South Minneapolis</title>
<style>
  :root{
    --bg:#0a0a0a;
    --bg-panel:#141414;
    --ink:#f5f5f3;
    --ink-dim:#9c9c98;
    --red:#e02420;
    --line:#2b2b2b;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  h1,h2{margin:0; font-size:1.5rem; font-weight:700;}
  a{color:inherit;}
  img{max-width:100%;display:block;}

  .nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 5vw;
    border-bottom:1px solid var(--line);
  }
  .nav-brand{display:flex; align-items:center; gap:12px;}
  .nav-brand img{height:38px; width:auto; border-radius:50%;}
  .nav-name{font-size:0.85rem; line-height:1.2;}
  .nav-name small{color:var(--ink-dim); font-size:0.75rem; display:block;}
  .nav-contact{display:flex; align-items:center; gap:18px;}
  .nav-contact a{font-size:0.85rem; color:var(--ink-dim); text-decoration:none;}
  .nav-contact a:hover{color:var(--ink);}

  .btn{
    display:inline-block;
    background:var(--red);
    color:#fff;
    padding:10px 18px;
    font-size:0.85rem;
    font-weight:600;
    text-decoration:none;
    border:none;
    border-radius:var(--radius);
    cursor:pointer;
  }
  .btn:hover{background:#c91d1a;}

  .hero{
    padding:5vh 5vw 6vh;
    border-bottom:1px solid var(--line);
  }
  .hero-inner{width:100%;}

  form{
    width:100%;
    background:var(--bg-panel);
    border:1px solid var(--line);
    padding:24px;
    border-radius:var(--radius);
  }
  .form-head{margin-bottom:18px;}
  .form-head h2{font-size:1.25rem;}
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:0.8rem;
    color:var(--ink-dim);
    margin-bottom:6px;
  }
  .field label .req{color:var(--red);}
  .field input, .field select, .field textarea{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--ink);
    padding:10px 12px;
    font-size:0.95rem;
    border-radius:var(--radius);
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none;
    border-color:var(--red);
  }
  .field-row{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
  .field.span-2{grid-column:span 2;}
  .field.span-4{grid-column:1/-1;}
  .field textarea{resize:vertical; min-height:70px;}
  .form-status{margin-top:12px; font-size:0.85rem;}
  .form-status.ok{color:#7cbf7c;}
  .form-status.err{color:var(--red);}
  .form-status.pending{color:var(--ink-dim);}

  section{padding:5vh 5vw; border-bottom:1px solid var(--line);}
  section h2{margin-bottom:20px;}

  .schedule-table{width:100%; border-collapse:collapse; font-size:0.85rem;}
  .schedule-table th{
    text-align:left;
    font-size:0.75rem;
    color:var(--ink-dim);
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    border-left:1px solid var(--line);
  }
  .schedule-table th:first-child, .schedule-table td:first-child{border-left:none;}
  .schedule-table td{
    padding:12px;
    border-bottom:1px solid var(--line);
    border-left:1px solid var(--line);
    vertical-align:top;
  }
  .schedule-table tr:last-child td{border-bottom:none;}
  .schedule-table .time{font-size:0.8rem; color:var(--ink-dim); white-space:nowrap; width:110px;}
  .cell{
    padding:8px 10px;
    border-radius:var(--radius);
    background:var(--bg-panel);
    font-size:0.82rem;
    line-height:1.3;
  }
  .cell.beginner{background:rgba(224,36,32,0.14); border:1px solid rgba(224,36,32,0.4);}
  .cell.empty{background:transparent;}
  .schedule-status{color:var(--ink-dim); font-size:0.85rem; margin-bottom:16px;}
  .schedule-status.err{color:var(--red);}

  footer{
    padding:4vh 5vw;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
    font-size:0.85rem;
    color:var(--ink-dim);
  }
  .foot-brand{display:flex; align-items:center; gap:12px;}
  .foot-brand img{height:32px; border-radius:50%;}
  .foot-links{display:flex; gap:18px; flex-wrap:wrap;}
  .foot-links a{text-decoration:none; color:var(--ink-dim);}
  .foot-links a:hover{color:var(--ink);}

  @media(max-width:900px){
    .field-row{grid-template-columns:1fr;}
    .field.span-2,.field.span-4{grid-column:auto;}
    .nav-contact a:not(.btn){display:none;}
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <img src="logo-dangerroom.png" alt="Danger Room">
    <div class="nav-name">
      Danger Room
      <small>Checkmat South Minneapolis</small>
    </div>
  </div>
  <div class="nav-contact">
    <a href="tel:+16124709980">(612) 470-9980</a>
    <a href="mailto:checkmatsouthminneapolis@gmail.com">Email</a>
    <a href="#signup" class="btn">Book a Trial</a>
  </div>
</nav>

<header class="hero" id="signup">
  <div class="hero-inner">
    <form id="intake-form">
      <div class="form-head">
        <h2>Book a trial class</h2>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="fname">First name <span class="req">*</span></label>
          <input type="text" id="fname" name="firstName" required>
        </div>
        <div class="field">
          <label for="lname">Last name <span class="req">*</span></label>
          <input type="text" id="lname" name="lastName" required>
        </div>
        <div class="field">
          <label for="email">Email <span class="req">*</span></label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone">
        </div>
      </div>
      <div class="field-row">
        <div class="field span-2">
          <label for="experience">Experience</label>
          <select id="experience" name="experience">
            <option>Complete beginner</option>
            <option>Some experience</option>
            <option>Trained BJJ before</option>
          </select>
        </div>
        <div class="field span-2">
          <label for="classtime">Class time <span class="req">*</span></label>
          <select id="classtime" name="classTime" required>
            <option value="">Select a class</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field span-4">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes"></textarea>
        </div>
      </div>
      <button type="submit" class="btn" style="width:100%;">Submit</button>
      <div id="form-status" class="form-status"></div>
    </form>
  </div>
</header>

<section id="schedule">
  <h2>Schedule</h2>
  <p id="schedule-status" class="schedule-status">Loading schedule...</p>
  <table class="schedule-table" id="schedule-table">
    <thead>
      <tr id="schedule-head"></tr>
    </thead>
    <tbody id="schedule-body"></tbody>
  </table>
</section>

<footer>
  <div class="foot-brand">
    <img src="logo-dangerroom.png" alt="Danger Room">
    <div>1362 La Salle Ave, Minneapolis, MN 55403</div>
  </div>
  <div class="foot-links">
    <a href="tel:+16124709980">(612) 470-9980</a>
    <a href="mailto:checkmatsouthminneapolis@gmail.com">Email</a>
    <a href="https://www.instagram.com/dangerroom612/" target="_blank" rel="noopener">Instagram</a>
    <a href="https://www.facebook.com/profile.php?id=100087888228859" target="_blank" rel="noopener">Facebook</a>
    <a href="https://www.bing.com/maps/default.aspx?v=2&pc=FACEBK&mid=8100&where1=1362%20La%20Salle%20Ave.%2C%20Minneapolis%2C%20MN%2C%20United%20States%2C%2055403" target="_blank" rel="noopener">Directions</a>
  </div>
</footer>

<script>
  const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbwreXvBqM3n44lUqggl9BOaTi_Kf8mvIP4lJ_u8HTquZISCFMpz87MgdP951DgqhuWK/exec";

  const form = document.getElementById('intake-form');
  const status = document.getElementById('form-status');
  const scheduleHead = document.getElementById('schedule-head');
  const scheduleBody = document.getElementById('schedule-body');
  const scheduleStatus = document.getElementById('schedule-status');
  const classtime = document.getElementById('classtime');

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderScheduleCell(cell) {
    if (!cell.text) {
      return '<div class="cell empty">—</div>';
    }
    const className = cell.highlight ? 'cell beginner' : 'cell';
    const label = escapeHtml(cell.text).replace(/\n/g, '<br>');
    return `<div class="${className}">${label}</div>`;
  }

  function renderTrialOptions(labels) {
    classtime.innerHTML = '<option value="">Select a class</option>';
    labels.forEach((label) => {
      const option = document.createElement('option');
      option.textContent = label;
      classtime.appendChild(option);
    });
  }

  async function loadSchedule() {
    if (ENDPOINT_URL.includes('PASTE_YOUR')) {
      scheduleStatus.textContent = 'Schedule not connected — add your endpoint URL.';
      scheduleStatus.className = 'schedule-status err';
      return;
    }

    try {
      const res = await fetch(ENDPOINT_URL);
      if (!res.ok) throw new Error('request failed');

      const data = await res.json();
      const headers = data.schedule?.headers?.length
        ? data.schedule.headers
        : ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const rows = data.schedule?.rows || [];

      scheduleHead.innerHTML = '<th></th>' + headers
        .map((header) => `<th>${escapeHtml(header)}</th>`)
        .join('');

      if (!rows.length) {
        scheduleBody.innerHTML = '<tr><td colspan="7">No schedule rows found in the Sheet.</td></tr>';
      } else {
        scheduleBody.innerHTML = rows.map((row) => `
          <tr>
            <td class="time">${escapeHtml(row.time)}</td>
            ${row.days.map((day) => `<td>${renderScheduleCell(day)}</td>`).join('')}
          </tr>
        `).join('');
      }

      renderTrialOptions(data.trialClasses || []);
      scheduleStatus.textContent = '';
    } catch (err) {
      scheduleStatus.textContent = 'Could not load schedule.';
      scheduleStatus.className = 'schedule-status err';
      scheduleBody.innerHTML = '';
    }
  }

  loadSchedule();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    status.textContent = 'Submitting...';
    status.className = 'form-status pending';

    const data = Object.fromEntries(new FormData(form).entries());

    if (ENDPOINT_URL.includes('PASTE_YOUR')) {
      status.textContent = 'Form not connected — add your endpoint URL.';
      status.className = 'form-status err';
      return;
    }

    try {
      await fetch(ENDPOINT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(data)
      });
      status.textContent = 'Submitted. Check your email for confirmation.';
      status.className = 'form-status ok';
      form.reset();
    } catch (err) {
      status.textContent = 'Error — call or email us instead.';
      status.className = 'form-status err';
    }
  });
</script>

</body>
</html>
